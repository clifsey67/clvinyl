<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vinyl ID">
    <title>Vinyl ID - Display Mode</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: white;
            background-color: #0a0a0a;
        }

        /* --- THE KALEIDOSCOPE BACKGROUND --- */
        .kaleidoscope {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            background-color: #0a0a0a;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            animation: orbit 20s infinite alternate ease-in-out;
            opacity: 0.6;
            transition: background 3s ease; /* Smooth crossfade when song changes */
        }

        .shape-1 { width: 60vw; height: 60vw; background: rgb(0, 150, 255); top: -10vh; left: -10vw; }
        .shape-2 { width: 50vw; height: 50vw; background: rgb(255, 100, 0); bottom: -10vh; right: -10vw; animation-delay: -5s; }
        .shape-3 { width: 70vw; height: 70vw; background: rgb(255, 255, 255); top: 20vh; left: 20vw; animation-delay: -10s; }

        @keyframes orbit {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20vw, 15vh) scale(1.3); }
            100% { transform: translate(-15vw, 25vh) scale(0.9); }
        }
        /* ---------------------------------- */

        #container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 5vw;
            box-sizing: border-box;
            gap: 6vw;
            z-index: 1;
        }

        #album-art {
            width: 45vw;
            max-width: 800px;
            aspect-ratio: 1 / 1;
            background-color: rgba(0,0,0,0.5);
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            transition: opacity 0.5s;
        }

        #info-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            max-width: 40vw;
        }

        #track-title {
            font-size: 5vw;
            font-weight: 800;
            margin: 0 0 1vh 0;
            line-height: 1.1;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #track-artist {
            font-size: 2.5vw;
            color: #e0e0e0;
            margin: 0 0 1vh 0;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }

        #status {
            font-size: 1.2vw;
            color: #1DB954;
            opacity: 0.8;
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(29, 185, 84, 0.1);
            border-radius: 30px;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @media (max-aspect-ratio: 1/1) {
            #container { flex-direction: column; text-align: center; gap: 4vh; }
            #info-panel { align-items: center; max-width: 90vw; }
            #album-art { width: 75vw; }
            #track-title { font-size: 8vw; }
            #track-artist { font-size: 5vw; }
            #status { font-size: 4vw; }
        }
    </style>
</head>
<body>
    <div class="kaleidoscope">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>
    
    <div id="container">
        <img id="album-art" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='500'><rect width='500' height='500' fill='%231a1a1a'/><circle cx='250' cy='250' r='150' fill='%23111'/><circle cx='250' cy='250' r='50' fill='%232a2a2a'/></svg>" alt="Album Art">
        <div id="info-panel">
            <h1 id="track-title">System Ready</h1>
            <h2 id="track-artist">Waiting for the Pi...</h2>
            <div id="status">Live Sync Active</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PI_IP_ADDRESS = '192.168.0.72'; 
        // ---------------------

        const API_URL = `http://${PI_IP_ADDRESS}:5000/api/now-playing`;
        
        let currentTitle = "";
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const albumArt = document.getElementById('album-art');

        async function syncWithPi() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Update UI only if a new track is detected
                if (data.title !== currentTitle) {
                    currentTitle = data.title;
                    
                    trackTitle.innerText = data.title;
                    trackArtist.innerText = data.artist;
                    
                    if (data.album_art) {
                        albumArt.src = data.album_art;
                    }
                }
                
                // Always update the colors in case the backend finishes processing them slightly after the title
                if (data.colors && data.colors.length >= 3) {
                    const c1 = data.colors[0];
                    const c2 = data.colors[1];
                    const c3 = data.colors[2];
                    
                    document.querySelector('.shape-1').style.background = `rgb(${c1[0]}, ${c1[1]}, ${c1[2]})`;
                    document.querySelector('.shape-2').style.background = `rgb(${c2[0]}, ${c2[1]}, ${c2[2]})`;
                    document.querySelector('.shape-3').style.background = `rgb(${c3[0]}, ${c3[1]}, ${c3[2]})`;
                }

            } catch (err) {
                console.log("Searching for Pi on network...", err);
            }
        }

        // Poll the Pi every 3 seconds
        setInterval(syncWithPi, 3000);
        syncWithPi(); 
    </script>
</body>
</html>
