<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vinyl ID">
    <title>Vinyl ID - Display Mode</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            color: white;
            background-color: #121212;
        }

        #dynamic-bg {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 120%;
            height: 120%;
            z-index: -1;
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            filter: blur(60px) saturate(150%) brightness(0.35);
            animation: breathe 20s infinite alternate ease-in-out;
            transition: background-image 1.5s ease-in-out;
        }

        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-2%, -2%); }
        }

        #container {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            padding: 5vw;
            box-sizing: border-box;
            gap: 6vw;
            z-index: 1;
        }

        #album-art {
            width: 45vw;
            max-width: 800px;
            aspect-ratio: 1 / 1;
            background-color: rgba(0,0,0,0.5);
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 30px 80px rgba(0,0,0,0.8);
            transition: opacity 0.5s;
        }

        #info-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            max-width: 40vw;
        }

        #track-title {
            font-size: 5vw;
            font-weight: 800;
            margin: 0 0 1vh 0;
            line-height: 1.1;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #track-artist {
            font-size: 2.5vw;
            color: #e0e0e0;
            margin: 0 0 1vh 0;
            font-weight: 500;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }

        #status {
            font-size: 1.2vw;
            color: #1DB954;
            opacity: 0.8;
            margin-top: 15px;
            padding: 10px 20px;
            background: rgba(29, 185, 84, 0.1);
            border-radius: 30px;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @media (max-aspect-ratio: 1/1) {
            #container { flex-direction: column; text-align: center; gap: 4vh; }
            #info-panel { align-items: center; max-width: 90vw; }
            #album-art { width: 75vw; }
            #track-title { font-size: 8vw; }
            #track-artist { font-size: 5vw; }
            #status { font-size: 4vw; }
        }
    </style>
</head>
<body>
    <div id="dynamic-bg"></div>
    <div id="container">
        <img id="album-art" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='500' height='500'><rect width='500' height='500' fill='%231a1a1a'/><circle cx='250' cy='250' r='150' fill='%23111'/><circle cx='250' cy='250' r='50' fill='%232a2a2a'/></svg>" alt="Album Art">
        <div id="info-panel">
            <h1 id="track-title">System Ready</h1>
            <h2 id="track-artist">Waiting for the Pi...</h2>
            <div id="status">Live Sync Active</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const PI_IP_ADDRESS = '192.168.0.72'; 
        // ---------------------

        const API_URL = `http://${PI_IP_ADDRESS}:5000/api/now-playing`;
        
        let currentTitle = "";
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const albumArt = document.getElementById('album-art');
        const dynamicBg = document.getElementById('dynamic-bg');

        async function syncWithPi() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                // Update UI only if a new track is detected
                if (data.title !== currentTitle) {
                    currentTitle = data.title;
                    
                    trackTitle.innerText = data.title;
                    trackArtist.innerText = data.artist;
                    
                    if (data.album_art) {
                        albumArt.src = data.album_art;
                        dynamicBg.style.backgroundImage = `url('${data.album_art}')`;
                    }
                }
            } catch (err) {
                console.log("Searching for Pi on network...", err);
            }
        }

        // Poll the Pi every 3 seconds
        setInterval(syncWithPi, 3000);
        syncWithPi(); 
    </script>
</body>
</html>
